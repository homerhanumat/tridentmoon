project:
  type: website
  output-dir: docs

website:
  title: "Trident Moon Yoga"
  favicon: images/trident_favicon.jpg
  #site-path: "/personal-homer-white/"
  reader-mode: true
  #repo-url: https://github.com/homerhanumat/personal-homer-white
  #repo-actions: issue
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: about.qmd
        text: About
      - href: schedule.qmd
        text: Classes
      - href: articles/index.qmd
        text: Articles 
      - href: posts/index.qmd
        text: Blog
    tools:
      - icon: facebook
        href: https://www.facebook.com/profile.php?id=61556987980351

  sidebar:

    - logo:  images/trident_logo.jpeg
      style: "docked"
      background: light
      collapse-level: 2
      contents:
        - section: "Articles"
          href: articles/index.qmd
          contents: 
            - text: "Ashtanga Resources"
              href:  articles/ashtanga-resources/index.qmd
            - text: "Primary Series Postures"
              href:  articles/primary-series-postures/index.qmd
        - section: "Posts"
          href: posts/index.qmd
          #contents: "posts/*/*.qmd"
          #sort:
          #  - "date desc"


format:
  html:
    theme: 
      light: flatly
      dark: darkly
    css: styles.css
    toc: true
    footnotes-hover: true

execute:
  freeze: false

resources:
  - CNAME